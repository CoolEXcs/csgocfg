// параметры запуска -novid -tickrate 128 -console +rate 128000 cl_updaterate 128 cl_cmdrate 128 +cl_interp_ratio 1 +cl_interp 0.031  -freq 144 -refresh 144 +exec autoexec.cfg 
//-allow_third_party_software
//Основы

//red small-medium no dot CSGO-eKazV-Hj87h-7ZU8W-p96aj-TsKjC
/red very small no dot  CSGO-veCTx-KCx7x-mAh9A-EaTHK-yodqA
/red small gap no dot CSGO-dEmkK-R4Ph6-4QmPa-Cr4xF-9w5qB
//kolya yellow CSGO-qJiLH-c53eW-cEM2a-rn5Py-sw3JE
//apply_crosshair_code CSGO-eKazV-Hj87h-7ZU8W-p96aj-TsKjC
sensitivity 2;

//viewmodel stanislaw9
viewmodel_fov "68.000000" 
viewmodel_offset_x "2.5" 
viewmodel_offset_y "1.150000" 
viewmodel_offset_z "-1.600000" 
viewmodel_presetpos "0" dd
viewmodel_recoil "0"
cl_viewmodel_shift_left_amt "1.5"
cl_viewmodel_shift_right_amt "0.75"
cl_bob_lower_amt "5"
cl_bobamt_lat "0.100000"
cl_bobamt_vert "0.100000"
cl_bobcycle "0.98"

//Всякие алиас бинды
alias +jumpthrow "+jump; -attack; -attack2"
alias -jumpthrow "-jump"
bind h "+jumpthrow"

bind "KP_PLUS" "toggle volume 0.1 1"

alias +esl "r_cleardecals ; +cl_show_team_equipment"
alias -esl "r_cleardecals ; -cl_show_team_equipment"
bind "n" "r_cleardecals" 

alias +rad "cl_radar_scale "1.0"
alias -rad "cl_radar_scale "0.4"
bind "c" "+rad;use weapon_healthshot" 

+cl_show_team_equipment ; 

alias +walkvol "voice_scale 0.1;+speed" ;
alias -walkvol "voice_scale 1;-speed" ; 
bind "shift" "+walkvol";

//алиасы
alias "commands" "key_listboundkeys"
alias "comands" "key_listboundkeys"
alias "help" "key_listboundkeys"
alias "recfg" "exec autoexec"
alias "autoexec" "exec autoexec"
alias "c" "clear"
alias "roundfix" "mp_ignore_round_win_conditions 0"
alias "rs" "mp_restartgame 1"			
alias "swap" "mp_swapteams"	
alias "ToggleRespawn" "toggle mp_respawn_on_death_ct;toggle mp_respawn_on_death_t" 	
alias "res" "ToggleRespawn"
alias "wh" "ToggleWh"  
alias "ToggleWh" "toggle r_drawothermodels 2 1" 
alias "m" "sv_cheats 1; impulse 101" 
alias "money" "sv_cheats 1; impulse 101"
alias "bk" "bot_kick 1" 
alias "wm" "mp_warmup_start; mp_warmuptime 99999999" 
alias "offhud" "cl_draw_only_deathnotices 1; cl_drawhud 1"
alias "onhud" "cl_draw_only_deathnotices 0; cl_drawhud 0" 
alias "wmt" "mp_warmuptime 99999999"
alias "bat" "bot_add t"
alias "bct" "bot_add ct"
alias "bkt" "bot_kick t"
alias "bkc" "bot_kick ct"

//Бинды на закуп
bind kp_end "BUY vest" 
bind kp_downarrow "BUY vesthelm" 
bind kp_pgdn "BUY flashbang"
bind kp_leftarrow "BUY hegrenade"
bind kp_5 "BUY smokegrenade"
bind kp_rightarrow "BUY defuser"
bind kp_home "BUY molotov; BUY incgrenade"
bind kp_uparrow "ECHO unbinded"
bind kp_ins "Buy ak47;buy m4a1"
bind kp_enter "Buy p250"
bind kp_pgup "Buy deagle"

//Дефолт бинды клавиатуры (мои)
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "a" "+moveleft"
bind "b" "buymenu"
bind "d" "+moveright"
bind "f" "+lookatweapon"
bind "g" "drop"
bind "m" "sv_rethrow_last_grenade"
bind "q" "lastinv"
bind "r" "+reload"
bind "s" "+back"
bind "t" "+spray_menu"
bind "u" "messagemode2"
bind "w" "+forward"
bind "y" "messagemode"
bind "`" "toggleconsole"
bind "ESCAPE" "cancelselect"
bind "CTRL" "+duck"
bind "F3" "autobuy"
bind "F4" "rebuy"
bind "F5" "jpeg"
bind "F6" "toggle cl_showpos 1 0"
bind "F10" "quit prompt"
bind "MOUSE2" "+attack2"
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"
bind "PAUSE" "pause"
bind "TAB" "+showscores"
bind "v" "noclip"
bind "0" "exec 0"
bind "=" "toggle host_timescale 1 7"

//Недефолт бинды
bind "j" "+voicerecord" // Говорить в микрофон
bind "," "+radialradio" //радио команды
bind "z" "player_ping " // Метка
bind "ENTER" "toggle cl_righthand 1 0" // Поменять расположение рук
bind "MOUSE5" "use weapon_knife;use weapon_flashbang" // Достать мгновенно флешку
bind "MOUSE3" "use weapon_knife;use weapon_smokegrenade" // Достать мгновенно смок
bind "6" "use weapon_knife;use weapon_molotov;use weapon_incgrenade" // Достать мгновенно молотов

//бинды на тренировку
bind "F7" "mp_warmup_pausetimer 1"
bind "F8" "mp_warmuptime 120;mp_warmup_pausetimer 0"

//Фигня от нико на звук 
voice_mixer_volume 1
snd_mixahead "0.025"
snd_headphone_pan_exponent "2"
snd_tensecondwarning_volume "0.08"
snd_roundstart_volume "0"
snd_roundend_volume "0"
snd_menumusic_volume "0"
snd_mute_mvp_music_live_players "1"

//Производительность

// Настройки инета

cl_cmdrate 128               // Сетевой параметр рек. 128
cl_updaterate 128            // Сетевой параметр рек. 128
rate 786432                  // Сетевой параметр рек. 786432

cl_lagcompensation 1         // Компенсирует разницу в пинге
cl_interpolate 1             // Включает интерполяцию
cl_interp_ratio 2            // Число промежутков между "интерполированием" мира
cl_interp 0.031              // Временной промежуток, через который происходит интерполяция
cl_predict 1                 // Предсказание со стороны клиента
cl_predictweapons 1          // Предсказание оружия со стороны клиента

// Буст фпс

mat_queue_mode 2             // Мультиядерная обработка
cl_forcepreload 0            // Отключение предзагрузки текстур +20 фпс
m_rawinput 1                 // Прямой ввод мыши
fps_max 0					 // Макс фпс
fps_max_menu 0				 // Макс фпс

